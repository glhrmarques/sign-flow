<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Flow</title>
</head>
<body>
    <p>Register</p>
    <form id="auth-form">
      <input type="email" id="email" name="email" placeholder="Email" required>
      <input type="password" id="password" name="password" placeholder="Password" required>
      <button type="submit" id="submit">Sign up</button>
    </form>
    <a href="signin.html">Already have an account? Sign in</a>


    <script>
        const emailInput = document.querySelector('#email');
        const submitButton = document.querySelector('#submit');
        const passwrd = document.querySelector('#password');

        submitButton.addEventListener('click', async (e) => {
            e.preventDefault();

            try {
                const response = await fetch('/signup', {
                    method: 'POST',
                    headers: {
                        'Content-type': 'application/json',
                    },
                    body: JSON.stringify({
                        emailSubmit: emailInput.value,
                        passwordSubmit: passwrd.value,
                    }),
                });

                const result = await response.json()

                if(response.ok){
                    window.location.href = '/home.html';
                } else {
                    alert(result.error || 'cadastro falhou')
                }

            } catch(error) {
                console.error("POST failed", error);
                alert("falhar ao enviar o e-mail. Tente novamente"); 

            }
        })
    

    </script>
</body>
</html>
